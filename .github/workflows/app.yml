name: My FastAPI app
on:
  push:
    paths:
      - "app/**"

jobs:
  our-DockerAPP-job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check version python
        run: python --version

      - name: Check Dockerfile
        run: |
          echo "Проверяем на наличие Dockerfile"
          ls -la app/
          if [ -f "app/Dockerfile" ]; then
            echo "Dockerfile найден"
          else
            echo "Dockerfile не найден"
            exit 1
          fi

      - name: Docker image
        run: |
          echo "Сборка Dockerfile"
          docker build -t my-app:hh-app -f app/Dockerfile .

      - name: Docker run
        run: |
          docker run -d \
          -e PORT=8000 \
          -e APP_CONFIG__REDIS__URL=${{ secrets.APP_CONFIG__REDIS__URL }} \
          -e APP_CONFIG__REDIS__CHANNEL=${{ secrets.APP_CONFIG__REDIS__CHANNEL }} \
          -e APP_CONFIG__DB__URL=${{ secrets.APP_CONFIG__DB__URL }} \
          -e APP_CONFIG__PING_APP__URL=${{ secrets.APP_CONFIG__PING_APP__URL }} \
          --name app-container my-app:hh-app
          sleep 5
          if [ "$(docker inspect -f '{{.State.Running}}' app-container)" == "true" ]; then
            echo "Контейнер запущен"
            docker stop app-container
          else
            echo "Контейнер упал"
            docker logs app-container
            exit 1
          fi
  test:
    needs: [our-first-job]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Testing app service
        working-directory: ./app
        run: |
          python -m pytest tests
