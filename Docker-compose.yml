services:
  db_hh:
    image: postgres:latest
    container_name: db_hh
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - hh_network

  test_db:
    image: postgres:latest
    container_name: test_db
    restart: always
    env_file:
      - .env.tests
    volumes:
      - test_postgres_data:/var/lib/postgresql
      - ./init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - hh_network

  app_tg:
    build:
      dockerfile: Dockerfile
      context: project_tg
    container_name: app_tg
    restart: always
    ports:
      - "4444:4444"
    env_file:
      - ./project_tg/.env
    depends_on:
      - db_hh
    networks:
      - hh_network

